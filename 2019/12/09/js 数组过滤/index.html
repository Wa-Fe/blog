色&quot;: &quot;黑色&quot;,</span><br><span class="line">            &quot;尺码&quot;: &quot;XL&quot;,</span><br><span class="line">            &quot;price&quot;: &quot;99&quot;,</span><br><span class="line">            &quot;stock&quot;: &quot;9999&quot;</span><br><span class="line">        &#125;, &#123;</span><br><span class="line">            &quot;颜色&quot;: &quot;黑色&quot;,</span><br><span class="line">            &quot;尺码&quot;: &quot;XXL&quot;,</span><br><span class="line">            &quot;price&quot;: &quot;99&quot;,</span><br><span class="line">            &quot;stock&quot;: &quot;9999&quot;</span><br><span class="line">        &#125;, &#123;</span><br><span class="line">            &quot;颜色&quot;: &quot;白色&quot;,</span><br><span class="line">            &quot;尺码&quot;: &quot;L&quot;,</span><br><span class="line">            &quot;price&quot;: &quot;99&quot;,</span><br><span class="line">            &quot;stock&quot;: &quot;9999&quot;</span><br><span class="line">        &#125;, &#123;</span><br><span class="line">            &quot;颜色&quot;: &quot;白色&quot;,</span><br><span class="line">            &quot;尺码&quot;: &quot;XL&quot;,</span><br><span class="line">            &quot;price&quot;: &quot;213213&quot;,</span><br><span class="line">            &quot;stock&quot;: &quot;23672163723&quot;</span><br><span class="line">        &#125;, &#123;</span><br><span class="line">            &quot;颜色&quot;: &quot;白色&quot;,</span><br><span class="line">            &quot;尺码&quot;: &quot;XXL&quot;,</span><br><span class="line">            &quot;price&quot;: &quot;99&quot;,</span><br><span class="line">            &quot;stock&quot;: &quot;9999&quot;</span><br><span class="line">        &#125;, &#123;</span><br><span class="line">            &quot;颜色&quot;: &quot;灰色&quot;,</span><br><span class="line">            &quot;尺码&quot;: &quot;L&quot;,</span><br><span class="line">            &quot;price&quot;: &quot;99&quot;,</span><br><span class="line">            &quot;stock&quot;: <h4 id="第一种"><a href="#第一种" class="headerlink" title="第一种"></a>第一种</h4><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line">   var filter = function multiFilter(array, filters) &#123;</span><br><span class="line">            const filterKeys = Object.keys(filters)</span><br><span class="line">            return array.filter((item) =&gt; &#123;</span><br><span class="line">                return filterKeys.every(key =&gt; &#123;</span><br><span class="line">                    if (!filters[key].length) return true</span><br><span class="line">                    return !!~filters[key].indexOf(item[key])</span><br><span class="line">                &#125;)</span><br><span class="line">            &#125;)</span><br><span class="line">        &#125;</span><br><span class="line">//需要查找的规格</span><br><span class="line">var sku = &#123;</span><br><span class="line">            颜色: [&#x27;白色&#x27;,],</span><br><span class="line">            尺码:[&#x27;XL&#x27;]</span><br><span class="line">        &#125;</span><br><span class="line"> console.log(filter(list,sku))  </span><br><span class="line"> //得到的数据为</span><br><span class="line">        [&#123;</span><br><span class="line">        price: &quot;213213&quot;</span><br><span class="line">        stock: &quot;23672163723&quot;</span><br><span class="line">        尺码: &quot;XL&quot;</span><br><span class="line">        颜色: &quot;白色&quot;</span><br><span class="line">        &#125;]</span><br><span class="line">        </span><br><span class="line">        </span><br></pre></td></tr></table></figure>

<h4 id="第二种"><a href="#第二种" class="headerlink" title="第二种"></a>第二种</h4><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line"> let filter = (sku, list) =&gt; &#123;</span><br><span class="line">            return data.filter(item =&gt; &#123;</span><br><span class="line">                return Object.keys(condition).every(key =&gt; &#123;</span><br><span class="line">                    return String(item[key]).toLowerCase().includes(</span><br><span class="line">                        String(condition[key]).trim().toLowerCase())</span><br><span class="line">                &#125;)</span><br><span class="line">            &#125;)</span><br><span class="line">        &#125;</span><br><span class="line">        </span><br><span class="line">//需要查找的条件</span><br><span class="line"> var sku = &#123;</span><br><span class="line">            颜色:&#x27;白色&#x27;,</span><br><span class="line">            尺码:&#x27;XL&#x27;</span><br><span class="line">        &#125;     </span><br><span class="line"></span><br><span class="line"> console.log(filter(sku,a))</span><br><span class="line"> //这里会有两个数据</span><br><span class="line"> [</span><br><span class="line">     &#123;</span><br><span class="line">        price: &quot;213213&quot;</span><br><span class="line">        stock: &quot;23672163723&quot;</span><br><span class="line">        尺码: &quot;XL&quot;</span><br><span class="line">        颜色: &quot;白色&quot;</span><br><span class="line">     &#125;,</span><br><span class="line">     &#123;</span><br><span class="line">        price: &quot;99&quot;</span><br><span class="line">        stock: &quot;9999&quot;</span><br><span class="line">        尺码: &quot;XXL&quot;</span><br><span class="line">        颜色: &quot;白色&quot;</span><br><span class="line">     &#125;</span><br><span class="line"> ]</span><br></pre></td></tr></table></figure>
